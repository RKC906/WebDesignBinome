; Configuration PHP personnalisée

; Upload max
upload_max_filesize = 10M
post_max_size = 10M

; Timezone
date.timezone = "Europe/Paris"

; Display errors (à mettre à off en production)
display_errors = On
error_reporting = E_ALL

; Session
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.cookie_secure = 0  ; Mettre à 1 en HTTPS

; Extensions
extension = pdo_pgsql
