<VirtualHost *:80>
    ServerName localhost
    ServerAlias localhost

    # Définir le répertoire racine
    DocumentRoot /var/www/html/backoffice

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Activer .htaccess
    <Directory /var/www/html/backoffice>
        AllowOverride All
        Require all granted

        # Réécriture d'URL
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php?url=$1 [QSA,L]
    </Directory>

    # Configuration pour le Backoffice
    <Directory /var/www/html/backoffice>
        AllowOverride All
        Require all granted
    </Directory>

    # Configuration pour le Frontoffice
    <Directory /var/www/html/frontoffice>
        AllowOverride All
        Require all granted
    </Directory>

    # Permissions pour les uploads
    <Directory /var/www/html/backoffice/uploads>
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/frontoffice/uploads>
        AllowOverride None
        Require all granted
    </Directory>

    Alias /uploads /var/www/html/uploads
    <Directory /var/www/html/uploads>
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>

