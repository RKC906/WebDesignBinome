version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: webdesign-postgres
    environment:
      POSTGRES_USER: webdesignuser
      POSTGRES_PASSWORD: webdesignmdp
      POSTGRES_DB: webdesigndb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webdesignuser -d webdesigndb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - webdesign-network

  webserver:
    build:
      context: ./webserver
      dockerfile: Dockerfile
    container_name: webdesign-apache
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Backoffice:/var/www/html/backoffice
      - ./Frontoffice:/var/www/html/frontoffice
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=webdesignuser
      - POSTGRES_PASSWORD=webdesignmdp
      - POSTGRES_DB=webdesigndb
    networks:
      - webdesign-network

volumes:
  postgres_data:

networks:
  webdesign-network:
    driver: bridge
